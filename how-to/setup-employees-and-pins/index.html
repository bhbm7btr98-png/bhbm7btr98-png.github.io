<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup employees and their PIN's | Elephant POS</title>
  <style>
    :root { color-scheme: dark; --bg: #0b1118; --panel: #151d27; --line: rgba(255,255,255,0.08); --ink: #f3f6fb; --muted: rgba(243,246,251,0.72); --accent: #92c7ff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #0a1017, #111926); color: var(--ink); }
    main { max-width: 860px; margin: 0 auto; padding: 80px 20px; }
    .card { padding: 36px; border-radius: 28px; background: linear-gradient(180deg, rgba(29,34,43,0.98), rgba(20,25,34,0.98)); border: 1px solid var(--line); }
    h1 { margin: 0 0 12px; font-size: clamp(2.2rem, 5vw, 3.6rem); letter-spacing: -0.05em; }
    p { color: var(--muted); font-size: 1.05rem; line-height: 1.6; }
    a { display: inline-block; margin-top: 18px; color: #08111d; text-decoration: none; font-weight: 700; padding: 14px 22px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), #67acf4); }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Setup employees and their PIN's</h1>
      <p>This page is ready for your content.</p>
      <a href="/">Back to homepage</a>
    </div>
  </main>
</body>
</html>
